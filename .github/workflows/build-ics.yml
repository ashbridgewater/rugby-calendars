name: Build calendars

on:
  schedule:
    # Daily at 06:30 UTC. Content-gated commits mean no-op runs produce no diff.
    - cron: "30 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'

concurrency:
  group: build-ics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Scrape + build + validate calendars
        run: python -m scripts.run_pipeline --config config/calendars.yml

      - name: Heartbeat (defeat GitHub 60-day scheduled-workflow auto-disable)
        run: date -u +%Y-%m > state/heartbeat.txt

      - name: Commit changes (only when content actually changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): auto-update rugby calendars"
          file_pattern: "calendar/*.ics data/*.csv state/*.json state/heartbeat.txt"
