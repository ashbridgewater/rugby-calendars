name: Build calendar

on:
  workflow_dispatch:
    inputs:
      calendar_id:
        description: "Which calendar from config/calendars.yml?"
        type: string
        default: "autumn_2025"
        required: true
      source_url:
        description: "Optional: scrape from this URL (empty = skip scraping)"
        type: string
        required: false
        default: ""
  push:
    paths:
      - 'data/*.csv'
      - 'config/calendars.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CALENDAR_ID: ${{ inputs.calendar_id }}
      SOURCE_URL: ${{ inputs.source_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Scrape (optional) and build ICS
        run: |
          python scripts/scrape_and_build.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: build ${{ env.CALENDAR_ID }} (scrape optional)"
          file_pattern: |
            data/*.csv
            calendar/*.ics
